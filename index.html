<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safe School</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f5f7fb;
}

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.logo{
font-size:26px;
font-weight:bold;
color:#2b7cff;
}

nav a{

margin-left:25px;
text-decoration:none;
color:#333;
font-weight:500;

}

.hero{

display:flex;
align-items:center;
justify-content:space-between;
padding:80px;

}

.hero-text h1{

font-size:50px;
color:#333;

}

.hero-text p{

margin-top:15px;
font-size:18px;
color:#666;

}

.btn{

margin-top:25px;
padding:14px 28px;
border:none;
background:#2b7cff;
color:white;
border-radius:25px;
font-size:16px;
cursor:pointer;

}

.hero img{

width:400px;

}

.container{

width:85%;
margin:auto;
margin-top:40px;
display:none;

}

.card{

background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

input,select,textarea{

width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;

}

textarea{

height:100px;

}

.submit{

background:#2b7cff;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;

}

.stats{

display:flex;
gap:20px;
margin-bottom:20px;

}

.stat{

flex:1;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.stat h2{

color:#2b7cff;

}

table{

width:100%;
border-collapse:collapse;
background:white;

}

th,td{

padding:12px;
border-bottom:1px solid #eee;

}

</style>

</head>

<body>

<header>

<div class="logo">Safe School</div>

<nav>

<a href="#" onclick="home()">Trang chủ</a>
<a href="#" onclick="report()">Báo cáo</a>
<a href="#" onclick="dashboard()">Dashboard</a>

</nav>

</header>

<section class="hero" id="home">

<div class="hero-text">

<h1>Bảo vệ học sinh</h1>

<p>Hệ thống báo cáo bạo lực học đường và sự cố trong trường</p>

<button class="btn" onclick="report()">Gửi báo cáo</button>

</div>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">

</section>

<div class="container" id="report">

<div class="card">

<h2>Gửi báo cáo sự cố</h2>

<input id="name" placeholder="Tên học sinh">

<input id="class" placeholder="Lớp">

<select id="type">

<option>Bạo lực học đường</option>
<option>Bắt nạt</option>
<option>Vi phạm nội quy</option>

</select>

<select id="location">

<option>Sân trường</option>
<option>Hành lang</option>
<option>Nhà vệ sinh</option>
<option>Cổng trường</option>

</select>

<textarea id="desc" placeholder="Mô tả sự việc"></textarea>

<button class="submit" onclick="send()">Gửi báo cáo</button>

</div>

</div>

<div class="container" id="dashboard">

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>Tổng báo cáo</p>
</div>

<div class="stat">
<h2 id="violence">0</h2>
<p>Bạo lực</p>
</div>

<div class="stat">
<h2 id="rule">0</h2>
<p>Vi phạm</p>
</div>

</div>

<canvas id="chart"></canvas>

<br>

<table>

<tr>

<th>Học sinh</th>
<th>Lớp</th>
<th>Loại</th>
<th>Địa điểm</th>

</tr>

<tbody id="list"></tbody>

</table>

</div>

<script>

let data=[]

function home(){

document.querySelector(".hero").style.display="flex"
document.getElementById("report").style.display="none"
document.getElementById("dashboard").style.display="none"

}

function report(){

document.querySelector(".hero").style.display="none"
document.getElementById("report").style.display="block"
document.getElementById("dashboard").style.display="none"

}

function dashboard(){

document.querySelector(".hero").style.display="none"
document.getElementById("report").style.display="none"
document.getElementById("dashboard").style.display="block"

update()

}

function send(){

let n=name.value
let c=class.value
let t=type.value
let l=location.value

data.push({n,c,t,l})

alert("Đã gửi báo cáo!")

}

function update(){

total.innerText=data.length

let v=data.filter(x=>x.t=="Bạo lực học đường").length
let r=data.filter(x=>x.t=="Vi phạm nội quy").length

violence.innerText=v
rule.innerText=r

let html=""

data.forEach(x=>{

html+=`<tr>

<td>${x.n}</td>
<td>${x.c}</td>
<td>${x.t}</td>
<td>${x.l}</td>

</tr>`

})

list.innerHTML=html

drawChart(v,r)

}

function drawChart(v,r){

new Chart(document.getElementById("chart"),{

type:'pie',

data:{

labels:["Bạo lực","Vi phạm"],

datasets:[{

data:[v,r]

}]

}

})

}

</script>

</body>
</html>
