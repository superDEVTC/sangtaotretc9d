<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safe School</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h2>Safe School</h2>

<nav>

<button onclick="showHome()">Trang chủ</button>
<button onclick="showReport()">Báo cáo</button>
<button onclick="showDashboard()">Dashboard</button>

</nav>

</header>

<section id="home">

<h1>Hệ thống báo cáo bạo lực học đường</h1>

<p>Giúp học sinh báo cáo sự cố trong trường nhanh chóng</p>

<button onclick="showReport()">Gửi báo cáo</button>

</section>

<section id="report" class="hide">

<h2>Gửi báo cáo</h2>

<input id="name" placeholder="Tên học sinh">

<input id="class" placeholder="Lớp">

<select id="type">

<option>Bạo lực học đường</option>
<option>Bắt nạt</option>
<option>Vi phạm nội quy</option>

</select>

<select id="location">

<option>Sân trường</option>
<option>Hành lang</option>
<option>Lớp học</option>
<option>Nhà vệ sinh</option>

</select>

<textarea id="desc" placeholder="Mô tả"></textarea>

<button onclick="sendReport()">Gửi</button>

</section>

<section id="dashboard" class="hide">

<h2>Dashboard</h2>

<div class="stats">

<div>
<h3 id="total">0</h3>
<p>Tổng báo cáo</p>
</div>

<div>
<h3 id="violence">0</h3>
<p>Bạo lực</p>
</div>

<div>
<h3 id="rule">0</h3>
<p>Vi phạm</p>
</div>

</div>

<canvas id="chart"></canvas>

<table>

<tr>

<th>Học sinh</th>
<th>Lớp</th>
<th>Loại</th>
<th>Địa điểm</th>

</tr>

<tbody id="list"></tbody>

</table>

</section>

<script src="script.js"></script>

</body>
</html>
